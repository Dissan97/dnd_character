<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your D&D Character</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='create_character.css') }}">
</head>
<body>
<div>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</div>

<div class="insertion_container">
    <div class="logo">
        Create Your D&D Character
    </div>
    <form action="{{ url_for('create_character.create_character_form') }}" method="post">

        <div class="form-group">
            <label for="char_name">Character Name:</label>
            <input type="text" id="char_name" name="char_name" required>
        </div>
        <div class="form-group">
            <label for="class">Class:</label>
            <div class="select-container">
                <select id="class" name="class" required>
                    {% for character_class in list_classes %}
                    <option value="{{ character_class }}">{{ character_class }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-group">
            <label for="race">Race:</label>
            <div class="select-container">
                <select id="race" name="race" required>
                    {% for race in list_races %}
                    <option value="{{ race }}">{{ race.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="background">Background:</label>
            <input type="text" id="background" name="background" required>
        </div>
        <div class="form-group">
            <label for="alignment">Alignment:</label>
            <input type="text" id="alignment" name="alignment" required>
        </div>
        <div class="form-group">
            <label for="level">Level:</label>
            <input type="number" id="level" name="level" required>
        </div>
        <div class="form-group">
            <input type="submit" value="Create Character">
        </div>
    </form>
</div>
</body>
</html>
